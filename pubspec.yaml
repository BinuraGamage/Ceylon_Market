name: ceylonmarketplace
description: "A Flutter marketplace for Sri Lankan local products - Group 57"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  http: ^1.6.0
  cloudinary_api: ^1.1.1
  cloudinary_url_gen: ^1.8.0

  # State Management & Navigation
  flutter_riverpod: ^2.5.1
  go_router: ^13.0.0

  # Utils
  equatable: ^2.0.5
  uuid: ^4.3.3
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  fl_chart: ^1.2.0
  firebase_storage: ^12.4.10
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Sora
      fonts:
        - asset: assets/fonts/Sora-Regular.ttf
        - asset: assets/fonts/Sora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Sora-Bold.ttf
          weight: 700
